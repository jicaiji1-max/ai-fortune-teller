<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: -apple-system, sans-serif; background: #f2f2f7; display: flex; gap: 30px; padding: 40px; justify-content: center; }
.phone { width: 390px; background: white; border-radius: 40px; overflow: hidden; box-shadow: 0 20px 60px rgba(0,0,0,0.2); border: 8px solid #1a1a1a; }
.status-bar { background: white; padding: 14px 20px 8px; display: flex; justify-content: space-between; font-size: 12px; font-weight: 600; }
.nav-bar { background: white; padding: 8px 20px 12px; display: flex; justify-content: space-between; align-items: center; border-bottom: 0.5px solid rgba(0,0,0,0.1); }
.nav-title { font-size: 17px; font-weight: 600; }
.nav-btn { color: #8B35D4; font-size: 15px; font-weight: 600; }
.section { padding: 16px; }
.section-label { font-size: 13px; color: #8e8e93; margin-bottom: 8px; font-weight: 500; }

/* 图片区域 */
.photo-area { background: #f2f2f7; border-radius: 14px; height: 180px; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 8px; color: #8e8e93; font-size: 14px; margin: 0 16px; }

/* 文字输入区 */
.text-area { margin: 16px; padding: 12px; background: #f9f9fb; border-radius: 12px; min-height: 80px; font-size: 15px; color: #3c3c43; border: none; }

/* 标签选择区 */
.tag-section { padding: 0 16px 8px; }
.tag-label { font-size: 13px; color: #8e8e93; margin-bottom: 10px; font-weight: 500; }
.tag-row { display: flex; gap: 8px; flex-wrap: wrap; }
.tag { padding: 6px 14px; border-radius: 20px; font-size: 13px; font-weight: 500; cursor: pointer; }
.tag.selected { background: linear-gradient(135deg, #3358E0, #8B35D4); color: white; }
.tag.unselected { background: #f2f2f7; color: #3c3c43; }
.tag.add-tag { background: white; color: #8B35D4; border: 1.5px dashed #8B35D4; }

/* 位置区域 */
.location-row { margin: 0 16px; padding: 12px 14px; background: #f9f9fb; border-radius: 12px; display: flex; align-items: center; gap: 8px; color: #8e8e93; font-size: 14px; }

.divider { height: 0.5px; background: rgba(0,0,0,0.08); margin: 8px 16px; }
.label { font-size: 11px; color: #8e8e93; text-align: center; padding: 6px; font-weight: 500; }
</style>
</head>
<body>

<!-- 新建笔记（拍照模式） -->
<div>
<div class="label">新建笔记（标签在下方）</div>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span>●●●</span></div>
  <div class="nav-bar">
    <div class="nav-btn">取消</div>
    <div class="nav-title">拍照</div>
    <div class="nav-btn">保存</div>
  </div>

  <!-- 图片区域 -->
  <div class="photo-area">
    <span style="font-size:36px">📷</span>
    <span>点击拍照或选择图片</span>
  </div>

  <div style="height:12px"></div>

  <!-- 文字说明 -->
  <div class="tag-label" style="padding:0 16px 6px">添加说明（可选）</div>
  <div class="text-area" style="color:#c7c7cc">写点什么…</div>

  <div class="divider"></div>

  <!-- 标签选择 -->
  <div class="tag-section">
    <div class="tag-label">选择标签（可选）</div>
    <div class="tag-row">
      <div class="tag unselected">📌 工作</div>
      <div class="tag selected">🌿 生活</div>
      <div class="tag unselected">✈️ 旅行</div>
      <div class="tag unselected">🍜 美食</div>
      <div class="tag add-tag">＋</div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 位置 -->
  <div class="location-row">
    <span>📍</span>
    <span>获取当前位置</span>
  </div>

  <div style="height:20px"></div>
</div>
</div>

<!-- 编辑笔记 -->
<div>
<div class="label">编辑笔记（已有标签）</div>
<div class="phone">
  <div class="status-bar"><span>9:41</span><span>●●●</span></div>
  <div class="nav-bar">
    <div class="nav-btn">取消</div>
    <div class="nav-title">编辑</div>
    <div class="nav-btn">保存</div>
  </div>

  <!-- 图片网格 -->
  <div style="margin:12px 16px;display:grid;grid-template-columns:repeat(3,1fr);gap:4px;border-radius:12px;overflow:hidden">
    <div style="background:linear-gradient(135deg,#e8eaf8,#d4d8f5);height:110px;display:flex;align-items:center;justify-content:center;font-size:28px">🌸</div>
    <div style="background:linear-gradient(135deg,#eaf8e8,#d4f5d8);height:110px;display:flex;align-items:center;justify-content:center;font-size:28px">🌿</div>
    <div style="background:#f9f9fb;height:110px;display:flex;align-items:center;justify-content:center;color:#8B35D4;font-size:28px">＋</div>
  </div>

  <!-- 文字 -->
  <div class="text-area">北京的春天真的来了，玉兰花开了，今年特别美</div>

  <div class="divider"></div>

  <!-- 标签 -->
  <div class="tag-section">
    <div class="tag-label">标签</div>
    <div class="tag-row">
      <div class="tag unselected">📌 工作</div>
      <div class="tag selected">🌿 生活</div>
      <div class="tag unselected">✈️ 旅行</div>
      <div class="tag unselected">🍜 美食</div>
      <div class="tag add-tag">＋</div>
    </div>
  </div>

  <div class="divider"></div>

  <!-- 位置 -->
  <div class="location-row" style="color:#1c1c1e">
    <span>📍</span>
    <span style="flex:1">颐和园附近</span>
    <span style="color:#ff3b30;font-size:12px">✕</span>
  </div>

  <div style="height:20px"></div>
</div>
</div>

</body>
</html>
