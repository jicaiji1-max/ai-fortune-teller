<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>随手记 App 架构图</title>
<style>
body { font-family: -apple-system, BlinkMacSystemFont, 'PingFang SC', 'Microsoft YaHei', sans-serif; background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); padding: 20px; margin: 0; }
.container { max-width: 900px; margin: 0 auto; background: white; border-radius: 16px; padding: 30px; box-shadow: 0 20px 60px rgba(0,0,0,0.3); }
h1 { text-align: center; color: #333; font-size: 28px; margin-bottom: 30px; }
.box { padding: 15px; border-radius: 8px; text-align: center; margin: 15px 0; font-weight: 600; box-shadow: 0 2px 8px rgba(0,0,0,0.1); }
.app { background: #dae8fc; border: 2px solid #6c8ebf; }
.model { background: #fff2cc; border: 2px solid #d6b656; }
.content { background: #d5e8d4; border: 2px solid #82b366; }
.button { background: #f8cecc; border: 2px solid #b85450; display: inline-block; width: 30%; margin: 1%; }
.sheet { background: #f8cecc; border: 2px solid #b85450; display: inline-block; width: 30%; margin: 1%; }
.delete { background: #ffe6cc; border: 2px solid #d79b00; }
.confirm { background: #ffcdcd; border: 2px solid #ff0000; }
.note { background: #fff2cc; border: 2px solid #d6b656; }
.arrow { text-align: center; font-size: 20px; color: #666; margin: 10px 0; }
.stats { display: flex; justify-content: space-around; margin-top: 30px; padding-top: 20px; border-top: 2px solid #eee; }
.stat { text-align: center; }
.stat-num { font-size: 28px; font-weight: bold; color: #667eea; }
.stat-label { color: #666; font-size: 12px; margin-top: 5px; }
</style>
</head>
<body>
<div class="container">
<h1>📱 随手记 App 架构图</h1>

<div class="box app">🚀 SuishoujiApp (App 入口)</div>
<div class="arrow">⬇️</div>
<div class="box model">💾 ModelContainer (SwiftData 数据持久化)</div>
<div class="arrow">⬇️</div>
<div class="box content">🏠 ContentView (主界面)</div>
<div class="arrow">⬇️</div>
<div>
  <div class="box button">📷 拍照</div>
  <div class="box button">✏️ 写字</div>
  <div class="box button">📋 笔记列表</div>
</div>
<div class="arrow">⬇️</div>
<div>
  <div class="box sheet">📸 CameraView</div>
  <div class="box sheet">📝 TextEditorView</div>
  <div class="box delete">🗑️ 删除功能<br><small>按钮/长按/左滑</small></div>
</div>
<div class="arrow">⬇️</div>
<div class="box confirm">❓ 确认对话框<br><small>此操作无法撤销</small></div>
<div class="arrow">⬇️</div>
<div class="box note">📄 Note 模型<br><small>id, timestamp, type, text, photoData</small></div>

<div class="stats">
  <div class="stat">
    <div class="stat-num">252</div>
    <div class="stat-label">测试用例</div>
  </div>
  <div class="stat">
    <div class="stat-num">100%</div>
    <div class="stat-label">通过率</div>
  </div>
  <div class="stat">
    <div class="stat-num">3 种</div>
    <div class="stat-label">删除方式</div>
  </div>
  <div class="stat">
    <div class="stat-num">8 个</div>
    <div class="stat-label">测试文件</div>
  </div>
</div>
</div>
</body>
</html>
