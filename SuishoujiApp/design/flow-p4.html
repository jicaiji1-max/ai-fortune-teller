<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>P4 - 系统相册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background: #f5f5f5; padding: 20px; }
        .page-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .page-header { padding: 16px 20px; background: #f8f8f8; border-bottom: 1px solid #e5e5e5; font-weight: 600; font-size: 16px; }
        .page-content { padding: 20px; }
        .mockup { background: white; border: 1px solid #e5e5e5; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
        .interactions { background: #fafafa; border-radius: 8px; padding: 12px; }
        .interactions h4 { font-size: 14px; color: #8e8e93; margin-bottom: 10px; }
        .interaction-item { display: flex; align-items: center; gap: 8px; padding: 8px; background: white; border-radius: 6px; margin-bottom: 6px; font-size: 13px; border: 1px solid #e5e5e5; }
        .arrow { color: #007aff; font-weight: 600; }
        .target { color: #007aff; font-weight: 500; }
    </style>
</head>
<body>
    <div class="page-card">
        <div class="page-header">🖼️ P4 - 系统相册 (PhotosPicker)</div>
        <div class="page-content">
            <div class="mockup">
                <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:8px;">
                    <div style="background:#f5f5f5;aspect-ratio:1;border-radius:4px;"></div>
                    <div style="background:#e8e8e8;aspect-ratio:1;border-radius:4px;"></div>
                    <div style="background:#f0f0f0;aspect-ratio:1;border-radius:4px;"></div>
                    <div style="background:#e5e5e5;aspect-ratio:1;border-radius:4px;"></div>
                    <div style="background:#f5f5f5;aspect-ratio:1;border-radius:4px;"></div>
                    <div style="background:#e8e8e8;aspect-ratio:1;border-radius:4px;"></div>
                    <div style="background:#f0f0f0;aspect-ratio:1;border-radius:4px;"></div>
                    <div style="background:#e5e5e5;aspect-ratio:1;border-radius:4px;"></div>
                    <div style="background:#f5f5f5;aspect-ratio:1;border-radius:4px;"></div>
                </div>
                <div style="text-align:center;margin-top:16px;font-size:14px;color:#8e8e93;">最多选择 9 张照片</div>
            </div>
            <div class="interactions">
                <h4>交互跳转：</h4>
                <div class="interaction-item"><span>选择 1-9 张</span><span class="arrow">→</span><span class="target">P2</span></div>
                <div class="interaction-item"><span>点击取消</span><span class="arrow">→</span><span class="target">P2</span></div>
            </div>
        </div>
    </div>
</body>
</html>
