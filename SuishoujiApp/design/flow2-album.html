<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>流程 2：相册多选</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background: #f5f5f5; padding: 30px 20px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 22px; font-weight: 600; color: #1c1c1c; margin-bottom: 10px; }
        .flow-path { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .flow-box { padding: 8px 14px; border-radius: 8px; font-size: 14px; font-weight: 500; color: white; background: #34c759; }
        .arrow { color: #8e8e93; font-size: 16px; }
        .screenshots { display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; }
        .screenshot-item { display: flex; align-items: center; gap: 15px; }
        .step-num { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; color: white; background: #34c759; flex-shrink: 0; }
        .step-card { flex: 1; background: white; border-radius: 12px; padding: 18px; border: 1px solid #e5e5e5; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .step-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .step-title { font-size: 16px; font-weight: 600; color: #1c1c1c; }
        .step-desc { font-size: 14px; color: #8e8e93; margin-bottom: 12px; }
        .mockup { background: #fafafa; border: 1px solid #e5e5e5; border-radius: 10px; padding: 16px; }
        .btn { display: inline-block; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; text-align: center; }
        .btn-camera { background: #007aff; color: white; }
        .btn-cancel { background: #e5e5e5; color: #1c1c1c; }
        .btn-save { background: #34c759; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🖼️ 流程 2：从相册选择多张图片 (1-9 张)</h1>
        <div class="flow-path">
            <div class="flow-box">P1 首页</div><span class="arrow">→</span>
            <div class="flow-box">P2 拍照选择</div><span class="arrow">→</span>
            <div class="flow-box" style="background:#8e8e93;">P4 相册</div><span class="arrow">→</span>
            <div class="flow-box">P2 预览 (9 张)</div><span class="arrow">→</span>
            <div class="flow-box">P1 首页</div>
        </div>
    </div>
    <div class="screenshots">
        <div class="screenshot-item">
            <div class="step-num">1</div>
            <div class="step-card">
                <div class="step-header"><span class="step-title">P1 - 首页</span></div>
                <div class="step-desc">点击"拍照"按钮</div>
                <div class="mockup">
                    <div style="display:flex;gap:12px;">
                        <span class="btn btn-camera" style="flex:1;">📷 拍照</span>
                        <span class="btn" style="flex:1;background:#34c759;color:white;">✏️ 写字</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="screenshot-item">
            <div class="step-num">2</div>
            <div class="step-card">
                <div class="step-header"><span class="step-title">P2 - 拍照选择页</span></div>
                <div class="step-desc">点击"从相册选择"</div>
                <div class="mockup"><span class="btn btn-cancel" style="width:100%;">🖼️ 从相册选择（可多选）</span></div>
            </div>
        </div>
        <div class="screenshot-item">
            <div class="step-num" style="background:#8e8e93;">3</div>
            <div class="step-card">
                <div class="step-header"><span class="step-title">P4 - 系统相册</span></div>
                <div class="step-desc">选择 1-9 张照片</div>
                <div class="mockup">
                    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:6px;margin-bottom:12px;">
                        <div style="background:#34c759;aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;color:white;font-size:18px;">✓</div>
                        <div style="background:#34c759;aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;color:white;font-size:18px;">✓</div>
                        <div style="background:#34c759;aspect-ratio:1;border-radius:4px;display:flex;align-items:center;justify-content:center;color:white;font-size:18px;">✓</div>
                        <div style="background:#e5e5e5;aspect-ratio:1;border-radius:4px;"></div>
                        <div style="background:#e5e5e5;aspect-ratio:1;border-radius:4px;"></div>
                        <div style="background:#e5e5e5;aspect-ratio:1;border-radius:4px;"></div>
                        <div style="background:#e5e5e5;aspect-ratio:1;border-radius:4px;"></div>
                        <div style="background:#e5e5e5;aspect-ratio:1;border-radius:4px;"></div>
                        <div style="background:#e5e5e5;aspect-ratio:1;border-radius:4px;"></div>
                    </div>
                    <div style="text-align:center;font-size:13px;color:#8e8e93;">已选择 3/9 张</div>
                </div>
            </div>
        </div>
        <div class="screenshot-item">
            <div class="step-num">4</div>
            <div class="step-card">
                <div class="step-header"><span class="step-title">P2 - 预览 (3 张)</span></div>
                <div class="step-desc">预览选中的图片，可调整顺序或删除</div>
                <div class="mockup">
                    <div style="display:flex;gap:8px;margin-bottom:12px;">
                        <div style="flex:1;aspect-ratio:1;background:#34c759;border-radius:6px;display:flex;align-items:center;justify-content:center;color:white;font-size:24px;">✓</div>
                        <div style="flex:1;aspect-ratio:1;background:#34c759;border-radius:6px;display:flex;align-items:center;justify-content:center;color:white;font-size:24px;">✓</div>
                        <div style="flex:1;aspect-ratio:1;background:#34c759;border-radius:6px;display:flex;align-items:center;justify-content:center;color:white;font-size:24px;">✓</div>
                    </div>
                    <div style="text-align:center;font-size:12px;color:#8e8e93;margin-bottom:12px;">已选择 3 张图片</div>
                    <div style="display:flex;gap:8px;">
                        <span class="btn btn-cancel" style="flex:1;">取消</span>
                        <span class="btn btn-save" style="flex:1;">保存 (3 张)</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="screenshot-item">
            <div class="step-num">5</div>
            <div class="step-card">
                <div class="step-header"><span class="step-title">P1 - 首页 (3 张连发)</span></div>
                <div class="step-desc">3 张照片已添加到列表（可选 1-9 张）</div>
                <div class="mockup"><div style="color:#8e8e93;font-size:14px;">🖼️×3 新笔记卡片</div></div>
            </div>
        </div>
    </div>
</body>
</html>
