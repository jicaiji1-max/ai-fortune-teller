<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>流程 5：删除笔记</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background: #f5f5f5; padding: 30px 20px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 22px; font-weight: 600; color: #1c1c1c; margin-bottom: 10px; }
        .flow-path { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .flow-box { padding: 8px 14px; border-radius: 8px; font-size: 14px; font-weight: 500; color: white; background: #ff3b30; }
        .arrow { color: #8e8e93; font-size: 16px; }
        .screenshots { display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; }
        .screenshot-item { display: flex; align-items: center; gap: 15px; }
        .step-num { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; color: white; background: #ff3b30; flex-shrink: 0; }
        .step-card { flex: 1; background: white; border-radius: 12px; padding: 18px; border: 1px solid #e5e5e5; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .step-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .step-title { font-size: 16px; font-weight: 600; color: #1c1c1c; }
        .step-desc { font-size: 14px; color: #8e8e93; margin-bottom: 12px; }
        .mockup { background: #fafafa; border: 1px solid #e5e5e5; border-radius: 10px; padding: 16px; }
        .btn { display: inline-block; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; text-align: center; }
        .btn-delete { background: #ff3b30; color: white; }
        .btn-cancel { background: #e5e5e5; color: #1c1c1c; }
    </style>
</head>
<body>
    <div class="header">
        <h1>🗑️ 流程 5：删除笔记</h1>
        <div class="flow-path">
            <div class="flow-box">P1 首页</div><span class="arrow">→</span>
            <div class="flow-box">P7 删除确认</div><span class="arrow">→</span>
            <div class="flow-box">P1 首页</div>
        </div>
    </div>
    <div class="screenshots">
        <div class="screenshot-item">
            <div class="step-num">1</div>
            <div class="step-card">
                <div class="step-header"><span class="step-title">P1 - 首页</span></div>
                <div class="step-desc">长按笔记或点击删除按钮</div>
                <div class="mockup">
                    <div style="background:white;border:1px solid #e5e5e5;border-radius:8px;padding:12px;display:flex;justify-content:space-between;align-items:center;">
                        <div style="font-size:13px;color:#666;">笔记卡片</div>
                        <div style="font-size:18px;opacity:0.6;">🗑️</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="screenshot-item">
            <div class="step-num">2</div>
            <div class="step-card">
                <div class="step-header"><span class="step-title">P7 - 删除确认弹窗</span></div>
                <div class="step-desc">确认是否删除</div>
                <div class="mockup">
                    <div style="text-align:center;padding:10px;">
                        <div style="font-size:16px;font-weight:600;margin-bottom:6px;color:#1c1c1c;">确认删除？</div>
                        <div style="font-size:13px;color:#8e8e93;margin-bottom:16px;">删除后无法恢复</div>
                        <div style="display:flex;gap:8px;">
                            <span class="btn btn-cancel" style="flex:1;font-size:13px;">取消</span>
                            <span class="btn btn-delete" style="flex:1;font-size:13px;">删除</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="screenshot-item">
            <div class="step-num">3</div>
            <div class="step-card">
                <div class="step-header"><span class="step-title">P1 - 首页 (已移除)</span></div>
                <div class="step-desc">笔记已删除，下方笔记自动上移</div>
                <div class="mockup">
                    <div style="text-align:center;padding:20px;color:#34c759;font-size:14px;">
                        ✅ 笔记已移除<br>
                        <span style="color:#8e8e93;font-size:13px;">下方笔记自动上移填补空位</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
