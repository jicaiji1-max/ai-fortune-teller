<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>流程 4.3：编辑纯文字笔记</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background: #f5f5f5; padding: 30px 20px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 22px; font-weight: 600; color: #1c1c1c; margin-bottom: 10px; }
        .flow-path { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .flow-box { padding: 8px 14px; border-radius: 8px; font-size: 14px; font-weight: 500; color: white; background: #34c759; }
        .arrow { color: #8e8e93; font-size: 16px; }
        .screenshots { display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; }
        .screenshot-item { display: flex; align-items: center; gap: 15px; }
        .step-num { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; color: white; background: #34c759; flex-shrink: 0; }
        .step-card { flex: 1; background: white; border-radius: 12px; padding: 18px; border: 1px solid #e5e5e5; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .step-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .step-title { font-size: 16px; font-weight: 600; color: #1c1c1c; }
        .step-desc { font-size: 14px; color: #8e8e93; margin-bottom: 12px; }
        .mockup { background: #fafafa; border: 1px solid #e5e5e5; border-radius: 10px; padding: 16px; }
        .btn { display: inline-block; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; text-align: center; }
        .btn-save { background: #34c759; color: white; }
        .btn-cancel { background: #e5e5e5; color: #1c1c1c; }
        .tag { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .tag-text { background: #34c759; color: white; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📋 流程 4.3：编辑纯文字笔记</h1>
        <div class="flow-path">
            <div class="flow-box">P1 首页</div><span class="arrow">→</span>
            <div class="flow-box">P5 文字编辑</div><span class="arrow">→</span>
            <div class="flow-box">P1 首页</div>
        </div>
    </div>
    <div class="screenshots">
        <div class="screenshot-item">
            <div class="step-num">1</div>
            <div class="step-card">
                <div class="step-header"><span class="step-title">P1 - 首页</span></div>
                <div class="step-desc">点击纯文字笔记卡片</div>
                <div class="mockup">
                    <div style="background:white;border:1px solid #e5e5e5;border-radius:8px;padding:12px;">
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                            <span style="font-size:12px;color:#8e8e93;">昨天</span>
                            <span class="tag tag-text">📝 文字</span>
                        </div>
                        <div style="font-size:14px;color:#666;line-height:1.6;">今天天气真好，出去散步了，看到了很多漂亮的花...</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="screenshot-item">
            <div class="step-num">2</div>
            <div class="step-card">
                <div class="step-header"><span class="step-title">P5 - 文字编辑页</span></div>
                <div class="step-desc">修改文字内容</div>
                <div class="mockup">
                    <div style="background:white;border:1px solid #e5e5e5;border-radius:8px;padding:14px;min-height:150px;margin-bottom:12px;font-size:14px;color:#1c1c1c;line-height:1.7;">今天天气真好，出去散步了，看到了很多漂亮的花...<span style="color:#007aff;">|</span></div>
                    <div style="display:flex;gap:8px;">
                        <span class="btn btn-cancel" style="flex:1;">取消</span>
                        <span class="btn btn-save" style="flex:1;">保存</span>
                    </div>
                </div>
            </div>
        </div>
        <div class="screenshot-item">
            <div class="step-num">3</div>
            <div class="step-card">
                <div class="step-header"><span class="step-title">P1 - 首页 (已更新)</span></div>
                <div class="step-desc">文字已更新</div>
                <div class="mockup">
                    <div style="text-align:center;padding:15px;color:#34c759;font-size:14px;">
                        ✅ 笔记已更新<br>
                        <span style="color:#8e8e93;font-size:13px;">文字内容已保存</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
