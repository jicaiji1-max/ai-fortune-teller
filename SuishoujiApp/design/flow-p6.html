<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>P6 - 图片编辑页</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background: #f5f5f5; padding: 20px; }
        .page-card { background: white; border-radius: 12px; overflow: hidden; box-shadow: 0 2px 12px rgba(0,0,0,0.08); }
        .page-header { padding: 16px 20px; background: #f8f8f8; border-bottom: 1px solid #e5e5e5; font-weight: 600; font-size: 16px; }
        .page-content { padding: 20px; }
        .mockup { background: white; border: 1px solid #e5e5e5; border-radius: 10px; padding: 16px; margin-bottom: 16px; }
        .mockup-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 16px; padding-bottom: 12px; border-bottom: 1px solid #e5e5e5; }
        .mockup-title { font-weight: 600; font-size: 17px; }
        .btn { padding: 10px 20px; border-radius: 8px; border: none; font-size: 15px; font-weight: 500; }
        .btn-cancel { background: #e5e5e5; color: #1c1c1c; }
        .btn-save { background: #007aff; color: white; }
        .interactions { background: #fafafa; border-radius: 8px; padding: 12px; margin-bottom: 16px; }
        .interactions h4 { font-size: 14px; color: #8e8e93; margin-bottom: 10px; }
        .interaction-item { display: flex; align-items: center; gap: 8px; padding: 8px; background: white; border-radius: 6px; margin-bottom: 6px; font-size: 13px; border: 1px solid #e5e5e5; }
        .arrow { color: #007aff; font-weight: 600; }
        .target { color: #007aff; font-weight: 500; }
        .flow-section { background: linear-gradient(135deg, #5ac8fa, #64d2ff); border-radius: 10px; padding: 14px; }
        .flow-section h4 { color: white; font-size: 14px; margin-bottom: 12px; }
        .flow-step { display: flex; align-items: center; gap: 6px; padding: 8px; background: rgba(255,255,255,0.2); border-radius: 6px; margin-bottom: 6px; font-size: 13px; color: white; }
    </style>
</head>
<body>
    <div class="page-card">
        <div class="page-header">🖼️ P6 - 图片编辑页</div>
        <div class="page-content">
            <div class="mockup">
                <div class="mockup-header">
                    <span class="mockup-title">编辑</span>
                    <div style="display:flex;gap:8px;">
                        <button class="btn btn-cancel" style="padding:6px 14px;font-size:14px;">取消</button>
                        <button class="btn btn-save" style="padding:6px 14px;font-size:14px;">保存</button>
                    </div>
                </div>
                <div style="position:relative;">
                    <div style="background:#f5f5f5;height:160px;border-radius:8px;display:flex;align-items:center;justify-content:center;color:#8e8e93;font-size:50px;border:2px dashed #e5e5e5;">🖼️</div>
                    <div style="position:absolute;bottom:10px;right:10px;width:40px;height:40px;background:white;border-radius:50%;display:flex;align-items:center;justify-content:center;box-shadow:0 2px 8px rgba(0,0,0,0.15);font-size:20px;">🔄</div>
                </div>
                <div style="margin-top:14px;padding:12px;background:#f5f5f5;border-radius:8px;">
                    <div style="font-size:12px;color:#8e8e93;margin-bottom:4px;">添加说明（可选）</div>
                    <div style="font-size:14px;color:#1c1c1c;">已有的文字说明...</div>
                </div>
            </div>
            <div class="interactions">
                <h4>交互跳转：</h4>
                <div class="interaction-item"><span>点击"更换图片"</span><span class="arrow">→</span><span class="target">P4</span></div>
                <div class="interaction-item"><span>修改说明</span><span class="arrow">→</span><span class="target">当前页</span></div>
                <div class="interaction-item"><span>点击"保存"</span><span class="arrow">→</span><span class="target">P1</span></div>
                <div class="interaction-item"><span>点击"取消"</span><span class="arrow">→</span><span class="target">P1</span></div>
            </div>
            <div class="flow-section">
                <h4>📋 流程 4：上传后编辑</h4>
                <div class="flow-step"><span>P1 首页 (卡片)</span><span class="arrow">→</span><span>P6 图片编辑</span></div>
                <div class="flow-step"><span>P6</span><span class="arrow">→</span><span>P4 相册 (换图)</span></div>
                <div class="flow-step"><span>P4</span><span class="arrow">→</span><span>P6 编辑 (新图)</span></div>
                <div class="flow-step"><span>P6</span><span class="arrow">→</span><span>P1 首页 (更新)</span></div>
            </div>
        </div>
    </div>
</body>
</html>
