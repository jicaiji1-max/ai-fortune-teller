<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <title>流程 6：保存到相册</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { font-family: -apple-system, BlinkMacSystemFont, "SF Pro Text", sans-serif; background: #f5f5f5; padding: 30px 20px; }
        .header { text-align: center; margin-bottom: 25px; }
        .header h1 { font-size: 22px; font-weight: 600; color: #1c1c1c; margin-bottom: 10px; }
        .flow-path { display: flex; align-items: center; gap: 8px; flex-wrap: wrap; justify-content: center; }
        .flow-box { padding: 8px 14px; border-radius: 8px; font-size: 14px; font-weight: 500; color: white; }
        .fb-blue { background: #007aff; }
        .fb-orange { background: #ff9500; }
        .fb-gray { background: #8e8e93; }
        .arrow { color: #8e8e93; font-size: 16px; }
        .screenshots { display: flex; flex-direction: column; gap: 15px; max-width: 500px; margin: 0 auto; }
        .screenshot-item { display: flex; align-items: center; gap: 15px; }
        .step-num { width: 32px; height: 32px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 15px; font-weight: 600; color: white; background: #007aff; flex-shrink: 0; }
        .step-card { flex: 1; background: white; border-radius: 12px; padding: 18px; border: 1px solid #e5e5e5; box-shadow: 0 2px 8px rgba(0,0,0,0.06); }
        .step-header { display: flex; justify-content: space-between; align-items: center; margin-bottom: 10px; }
        .step-title { font-size: 16px; font-weight: 600; color: #1c1c1c; }
        .step-desc { font-size: 14px; color: #8e8e93; margin-bottom: 12px; }
        .mockup { background: #fafafa; border: 1px solid #e5e5e5; border-radius: 10px; padding: 16px; }
        .btn { display: inline-block; padding: 10px 20px; border-radius: 8px; font-size: 14px; font-weight: 500; text-align: center; }
        .btn-ok { background: #007aff; color: white; }
        .btn-cancel { background: #e5e5e5; color: #1c1c1c; }
        .tag { display: inline-block; padding: 4px 10px; border-radius: 4px; font-size: 12px; font-weight: 500; }
        .tag-menu { background: #ff9500; color: white; }
        .perm-icon { font-size: 40px; margin-bottom: 10px; }
    </style>
</head>
<body>
    <div class="header">
        <h1>📥 流程 6：保存到相册（长按菜单）</h1>
        <div class="flow-path">
            <div class="flow-box fb-blue">P1 首页</div><span class="arrow">→</span>
            <div class="flow-box fb-orange">P9 上下文菜单</div><span class="arrow">→</span>
            <div class="flow-box fb-gray">权限请求</div><span class="arrow">→</span>
            <div class="flow-box fb-blue">P1 首页</div>
        </div>
    </div>
    <div class="screenshots">
        <div class="screenshot-item">
            <div class="step-num">1</div>
            <div class="step-card">
                <div class="step-header"><span class="step-title">P1 - 首页</span></div>
                <div class="step-desc">长按笔记卡片（约 1 秒）</div>
                <div class="mockup">
                    <div style="background:white;border:2px solid #ff9500;border-radius:8px;padding:12px;position:relative;">
                        <div style="position:absolute;top:-8px;right:-8px;background:#ff9500;color:white;padding:4px 8px;border-radius:4px;font-size:12px;">长按</div>
                        <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:8px;">
                            <span style="font-size:12px;color:#8e8e93;">昨天</span>
                            <span class="tag" style="background:#5ac8fa;color:white;">🖼️ 单图</span>
                        </div>
                        <div style="background:#f5f5f5;height:60px;border-radius:6px;display:flex;align-items:center;justify-content:center;color:#8e8e93;">🖼️</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="screenshot-item">
            <div class="step-num" style="background:#ff9500;">2</div>
            <div class="step-card">
                <div class="step-header"><span class="step-title">P9 - 上下文菜单</span></div>
                <div class="step-desc">弹出操作菜单，选择"保存到相册"</div>
                <div class="mockup">
                    <div style="position:relative;height:150px;">
                        <div style="position:absolute;bottom:20px;left:50%;transform:translateX(-50%);background:white;border-radius:12px;overflow:hidden;box-shadow:0 4px 20px rgba(0,0,0,0.2);min-width:200px;">
                            <div style="padding:14px;border-bottom:1px solid #e5e5e5;font-size:14px;color:#007aff;font-weight:500;">📥 保存到相册</div>
                            <div style="padding:14px;font-size:14px;color:#ff3b30;">🗑️ 删除</div>
                        </div>
                        <div style="position:absolute;bottom:0;left:0;right:0;text-align:center;font-size:12px;color:#8e8e93;">点击"保存到相册"</div>
                    </div>
                </div>
            </div>
        </div>
        <div class="screenshot-item">
            <div class="step-num" style="background:#8e8e93;">3</div>
            <div class="step-card">
                <div class="step-header"><span class="step-title">权限请求弹窗</span></div>
                <div class="step-desc">请求相册写入权限</div>
                <div class="mockup">
                    <div style="text-align:center;padding:20px 10px;">
                        <div class="perm-icon">📷</div>
                        <div style="font-size:17px;font-weight:600;margin-bottom:8px;color:#1c1c1c;">允许"随手记"访问您的相册？</div>
                        <div style="font-size:13px;color:#8e8e93;margin-bottom:20px;">用于保存笔记图片到相册</div>
                        <div style="display:flex;gap:10px;flex-direction:column;">
                            <span class="btn btn-ok" style="width:100%;">允许</span>
                            <span class="btn btn-cancel" style="width:100%;">不允许</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="screenshot-item">
            <div class="step-num" style="background:#8e8e93;">3b</div>
            <div class="step-card">
                <div class="step-header"><span class="step-title">权限被拒绝</span></div>
                <div class="step-desc">用户拒绝权限，提示引导设置</div>
                <div class="mockup">
                    <div style="text-align:center;padding:20px 10px;">
                        <div class="perm-icon">🚫</div>
                        <div style="font-size:16px;font-weight:600;margin-bottom:8px;color:#1c1c1c;">无法保存</div>
                        <div style="font-size:13px;color:#8e8e93;margin-bottom:20px;">请在设置中允许访问相册</div>
                        <div style="display:flex;gap:10px;">
                            <span class="btn btn-cancel" style="flex:1;">取消</span>
                            <span class="btn btn-ok" style="flex:1;">去设置</span>
                        </div>
                    </div>
                </div>
            </div>
        </div>
        <div class="screenshot-item">
            <div class="step-num">4</div>
            <div class="step-card">
                <div class="step-header"><span class="step-title">P1 - 首页 (保存成功)</span></div>
                <div class="step-desc">图片已保存到相册</div>
                <div class="mockup">
                    <div style="text-align:center;padding:20px;color:#34c759;font-size:14px;">
                        ✅ 已保存到相册<br>
                        <span style="color:#8e8e93;font-size:13px;">可在系统相册中查看</span>
                    </div>
                </div>
            </div>
        </div>
    </div>
</body>
</html>
