name: Suishouji
options:
  bundleIdPrefix: com.openclaw
  deploymentTarget:
    iOS: "17.0"
  generateEmptyDirectories: true

settings:
  base:
    PRODUCT_NAME: Suishouji
    CURRENT_PROJECT_VERSION: "1"
    MARKETING_VERSION: "1.0"
    DEVELOPMENT_TEAM: ""
    CODE_SIGN_STYLE: Automatic
    SWIFT_VERSION: "6.0"

targets:
  Suishouji:
    type: application
    platform: iOS
    sources:
      - SuishoujiApp.swift
      - ContentView.swift
      - Note.swift
      - NoteRow.swift
      - CameraView.swift
      - TextEditorView.swift
      - Assets.xcassets
      - Preview Content
    settings:
      base:
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        SWIFT_EMIT_LOC_STRINGS: YES
    info:
      path: Info.plist
      properties:
        UILaunchScreen: {}
        CFBundleName: "$(PRODUCT_NAME)"
        CFBundleIdentifier: "$(PRODUCT_BUNDLE_IDENTIFIER)"
        NSCameraUsageDescription: "需要访问相机来拍摄照片"
        NSPhotoLibraryUsageDescription: "需要访问相册来添加照片到随手记"
