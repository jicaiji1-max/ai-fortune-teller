<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1400 1100">
  <rect width="1400" height="1100" fill="white"/>
  
  <!-- 标题 -->
  <text x="700" y="40" text-anchor="middle" font-size="26" font-weight="bold" fill="#333">📱 随手记 App 完整用户动线图（含 4 个优化点）</text>
  
  <!-- 开始 -->
  <ellipse cx="700" cy="80" rx="40" ry="25" fill="#000000"/>
  <text x="700" y="85" text-anchor="middle" font-size="14" fill="white">开始</text>
  
  <text x="700" y="125" text-anchor="middle" font-size="20" fill="#666">⬇️</text>
  
  <!-- 主界面 -->
  <rect x="550" y="135" width="300" height="50" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="700" y="163" text-anchor="middle" font-size="15" fill="#333">🏠 ContentView (主界面)</text>
  
  <text x="700" y="210" text-anchor="middle" font-size="20" fill="#666">⬇️</text>
  
  <!-- 用户操作决策 -->
  <rect x="550" y="220" width="300" height="80" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="700" y="250" text-anchor="middle" font-size="15" fill="#333">❓ 用户操作？</text>
  <text x="700" y="275" text-anchor="middle" font-size="13" fill="#666">拍照 | 写字 | 查看/编辑</text>
  
  <text x="700" y="330" text-anchor="middle" font-size="20" fill="#666">⬇️</text>
  
  <!-- 三个分支 -->
  <rect x="100" y="340" width="200" height="50" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="200" y="368" text-anchor="middle" font-size="14" fill="#333">📷 拍照</text>
  
  <rect x="450" y="340" width="200" height="50" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="550" y="368" text-anchor="middle" font-size="14" fill="#333">✏️ 写字</text>
  
  <rect x="800" y="340" width="200" height="50" rx="8" fill="#e1d5e7" stroke="#9673a6" stroke-width="2"/>
  <text x="900" y="368" text-anchor="middle" font-size="14" fill="#333">📋 查看/编辑</text>
  
  <!-- 拍照方式 -->
  <text x="200" y="420" text-anchor="middle" font-size="20" fill="#666">⬇️</text>
  <rect x="100" y="430" width="200" height="70" rx="8" fill="#ffe6cc" stroke="#d79b00" stroke-width="2"/>
  <text x="200" y="455" text-anchor="middle" font-size="13" fill="#333">📸 选择拍照方式</text>
  <text x="200" y="475" text-anchor="middle" font-size="11" fill="#666">系统相机 | 相册 | 更换</text>
  
  <!-- 优化点 1：系统相机 -->
  <rect x="50" y="520" width="100" height="40" rx="6" fill="#ffcdcd" stroke="#ff0000" stroke-width="2"/>
  <text x="100" y="543" text-anchor="middle" font-size="11" fill="#333">📷 系统相机</text>
  
  <rect x="160" y="520" width="100" height="40" rx="6" fill="#ffcdcd" stroke="#ff0000" stroke-width="2"/>
  <text x="210" y="543" text-anchor="middle" font-size="11" fill="#333">🖼️ 相册选择</text>
  
  <rect x="270" y="520" width="100" height="40" rx="6" fill="#ffe6cc" stroke="#d79b00" stroke-width="2"/>
  <text x="320" y="543" text-anchor="middle" font-size="11" fill="#333">🔄 更换图片</text>
  
  <!-- 优化点 2：图片数量显示 -->
  <rect x="800" y="430" width="300" height="70" rx="8" fill="#dae8fc" stroke="#6c8ebf" stroke-width="2"/>
  <text x="950" y="455" text-anchor="middle" font-size="14" fill="#333">📊 优化点 2：图片数量显示</text>
  <text x="950" y="475" text-anchor="middle" font-size="12" fill="#666">🖼️ 角标 + "• X 张图片"</text>
  
  <!-- 优化点 3：更换图片 -->
  <rect x="500" y="520" width="300" height="40" rx="8" fill="#fff2cc" stroke="#d6b656" stroke-width="2"/>
  <text x="650" y="543" text-anchor="middle" font-size="13" fill="#333">📸 多图预览（横向滚动）</text>
  
  <!-- 优化点 4：编辑模式 -->
  <rect x="800" y="520" width="300" height="40" rx="8" fill="#f8cecc" stroke="#b85450" stroke-width="2"/>
  <text x="950" y="543" text-anchor="middle" font-size="13" fill="#333">✏️ 编辑模式（加载所有图片）</text>
  
  <text x="200" y="590" text-anchor="middle" font-size="20" fill="#666">⬇️</text>
  <text x="650" y="590" text-anchor="middle" font-size="20" fill="#666">⬇️</text>
  <text x="950" y="590" text-anchor="middle" font-size="20" fill="#666">⬇️</text>
  
  <!-- 保存 -->
  <rect x="100" y="600" width="200" height="45" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="200" y="627" text-anchor="middle" font-size="14" fill="#333">💾 保存</text>
  
  <!-- 删除功能 -->
  <rect x="800" y="600" width="300" height="45" rx="8" fill="#ffe6cc" stroke="#d79b00" stroke-width="2"/>
  <text x="950" y="627" text-anchor="middle" font-size="14" fill="#333">🗑️ 删除功能（3 种方式）</text>
  
  <text x="200" y="675" text-anchor="middle" font-size="20" fill="#666">⬇️</text>
  <text x="950" y="675" text-anchor="middle" font-size="20" fill="#666">⬇️</text>
  
  <!-- 返回列表 -->
  <rect x="100" y="685" width="200" height="45" rx="8" fill="#d5e8d4" stroke="#82b366" stroke-width="2"/>
  <text x="200" y="712" text-anchor="middle" font-size="14" fill="#333">🔄 返回列表</text>
  
  <!-- 确认对话框 -->
  <rect x="800" y="685" width="300" height="45" rx="8" fill="#ffcdcd" stroke="#ff0000" stroke-width="2"/>
  <text x="950" y="712" text-anchor="middle" font-size="14" fill="#333">❓ 确认对话框（此操作无法撤销）</text>
  
  <!-- 统计信息 -->
  <rect x="50" y="770" width="1300" height="180" rx="10" fill="#f8f9fa" stroke="#ddd" stroke-width="2"/>
  <text x="700" y="805" text-anchor="middle" font-size="18" font-weight="bold" fill="#333">📊 测试统计 - 4 个优化点</text>
  
  <text x="160" y="850" text-anchor="middle" font-size="32" font-weight="bold" fill="#667eea">264</text>
  <text x="160" y="880" text-anchor="middle" font-size="13" fill="#666">测试用例</text>
  <text x="160" y="905" text-anchor="middle" font-size="11" fill="#999">+12 个新增</text>
  
  <text x="380" y="850" text-anchor="middle" font-size="32" font-weight="bold" fill="#667eea">100%</text>
  <text x="380" y="880" text-anchor="middle" font-size="13" fill="#666">通过率</text>
  <text x="380" y="905" text-anchor="middle" font-size="11" fill="#999">全部通过</text>
  
  <text x="600" y="850" text-anchor="middle" font-size="32" font-weight="bold" fill="#667eea">4 个</text>
  <text x="600" y="880" text-anchor="middle" font-size="13" fill="#666">优化点</text>
  <text x="600" y="905" text-anchor="middle" font-size="11" fill="#999">全部实现</text>
  
  <text x="820" y="850" text-anchor="middle" font-size="32" font-weight="bold" fill="#667eea">37 个</text>
  <text x="820" y="880" text-anchor="middle" font-size="13" fill="#666">测试用例</text>
  <text x="820" y="905" text-anchor="middle" font-size="11" fill="#999">TC-001~037</text>
  
  <text x="1040" y="850" text-anchor="middle" font-size="32" font-weight="bold" fill="#667eea">3 种</text>
  <text x="1040" y="880" text-anchor="middle" font-size="13" fill="#666">删除方式</text>
  <text x="1040" y="905" text-anchor="middle" font-size="11" fill="#999">按钮/长按/左滑</text>
  
  <text x="1260" y="850" text-anchor="middle" font-size="32" font-weight="bold" fill="#667eea">8 个</text>
  <text x="1260" y="880" text-anchor="middle" font-size="13" fill="#666">测试文件</text>
  <text x="1260" y="905" text-anchor="middle" font-size="11" fill="#999">完整覆盖</text>
  
  <!-- 优化点列表 -->
  <rect x="50" y="970" width="1300" height="110" rx="10" fill="#e8f4f8" stroke="#6c8ebf" stroke-width="2"/>
  <text x="700" y="1000" text-anchor="middle" font-size="16" font-weight="bold" fill="#333">✅ 4 个优化点</text>
  
  <text x="200" y="1030" text-anchor="middle" font-size="13" fill="#333">1️⃣ 系统相机功能</text>
  <text x="200" y="1050" text-anchor="middle" font-size="11" fill="#666">TC-026~027</text>
  
  <text x="500" y="1030" text-anchor="middle" font-size="13" fill="#333">2️⃣ 图片数量显示</text>
  <text x="500" y="1050" text-anchor="middle" font-size="11" fill="#666">TC-028~030</text>
  
  <text x="800" y="1030" text-anchor="middle" font-size="13" fill="#333">3️⃣ 更换图片修复</text>
  <text x="800" y="1050" text-anchor="middle" font-size="11" fill="#666">TC-031~033</text>
  
  <text x="1100" y="1030" text-anchor="middle" font-size="13" fill="#333">4️⃣ 编辑模式多图</text>
  <text x="1100" y="1050" text-anchor="middle" font-size="11" fill="#666">TC-034~037</text>
  
  <!-- 图例 -->
  <text x="700" y="1090" text-anchor="middle" font-size="11" fill="#999">🟥 系统相机 | 🟦 图片数量 | 🟨 更换图片 | 🟪 编辑模式 | 🟩 保存/列表 | 🟧 删除功能</text>
</svg>
